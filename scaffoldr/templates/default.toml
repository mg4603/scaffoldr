path = "pyproject.toml"
content = """
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "{project_name}"
version = "0.1.0"
description = ""
authors = [{{name = "{author}"}}]
license = {{text = "{license_}"}}
requires-python = ">={python_version}"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

"""

